version: "3.9"

services:
  travelbuddy_backend:
    container_name: travelbuddy_agent_final
    build: .
    environment:
      - REDIS_URL=${REDIS_URL}
      - AGENT_API_KEY=${AGENT_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - ENVIRONMENT=${ENVIRONMENT}
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - travel_net

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
    networks:
      - travel_net

  nginx:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    container_name: travelbuddy_nginx_final
    depends_on:
      - travelbuddy_backend
    networks:
      - travel_net

networks:
  travel_net:
    driver: bridge
